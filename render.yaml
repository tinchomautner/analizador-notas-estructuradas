# Blueprint de Render — deploy en 1 clic (lee el Dockerfile).
# La OPENAI_API_KEY NO va acá: Render la pide al desplegar (sync:false) y queda como secreto.
services:
  - type: web
    name: analizador-notas-estructuradas
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: LLM_PROVIDER
        value: openai
